<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结局三</title>
    <style>
        /* 引入你指定的点阵字体 */
        @font-face {
  font-family: 'DotFont';
  src: url('../../fonts/精品点阵体 简 9×9 Regular.ttf') format('truetype');
}

        /* 全屏黑底 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            /* 居中 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'DotFont', monospace;
            color: #880000; /* 血色暗红 */
        }

        /* 主标题大字 */
        .title {
            font-size: 120px;
            margin-bottom: 40px;
        }

        /* 副标题小字 */
        .subtitle {
            font-size: 40px;
            line-height: 1.6;
            color: #991111;
        }
    </style>
</head>
<body>
    <div class="title">结局三</div>
    <div class="subtitle">恭喜你，懵懂无知地走向了故事的结局，</div>
    <div class="subtitle">这何尝不是一种幸运。</div>
</body>
</html>
