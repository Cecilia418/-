     &nbsp;&nbsp;今天看到信息中心发来的统计，我们建的那个地方文献数据库，本月访问量突破了五千次。有研究者从数据库里找到了自己需要的碑刻全文，发邮件来感谢。想起两年前刚开始做这个项目时，有人说地方文献“没多少人在意”。现在看来，不是没人在意，是没有用方便的方式呈现。让沉睡的材料“活”起来，这就是图书馆的意义。
