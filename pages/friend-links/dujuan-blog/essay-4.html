  <div class="date">2023-11-02</div>
  <div class="content">
     &nbsp;&nbsp;近期和计算机学院合作，尝试用图像识别技术分析水神庙壁画。结果意外发现，同一座庙不同时期的壁画，在人物服饰细节上有明显变化，这背后可能反映了信仰群体的变迁。技术工具确实能打开新的问题视野。不过工具终归是工具，问题意识还得来自对问题主体的熟悉。带的那位计算机专业的学生，现在已经能熟练辨认壁画里的神祇形象了，很有意思的跨学科碰撞。
