  <div class="title"> 图书馆与学术生态</div>
  <div class="date">2022-08-30</div>
  <div class="content">
     &nbsp;&nbsp;有年轻老师问我，图书馆在学术研究中到底能扮演什么角色？我觉得至少有三层：资源提供者（最基础）、方法协作伙伴、学术交流平台（比如我们定期办的“学术沙龙”）。图书馆不应该只是藏书楼，而要成为学术生态的有机部分。这需要我们馆员队伍不断更新知识结构，也需要师生的共同参与。
