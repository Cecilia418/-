<title>随笔详情 - 杜眷的博客</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:"SimSun",宋体,Arial,sans-serif;

.container{

.title{

}
.content{
    margin-bottom:30px;
    text-align:justify;
    font-size:17px;
    line-height:2;
}
.puzzle{
    border:2px dashed #aaa;
    width:360px;
    height:200px;
    display:flex;
    align-items:center;
    justify-content:center;
    resize:both;
    overflow:hidden;

}
.back{
    text-align:center;

.back a{
    color:#06c;

    font-size:16px;
}

</head>
<body>
<div class="container">
  <div class="title">初心依旧</div>
  <div class="date">2025-02-17</div>
  <div class="content">
     &nbsp;&nbsp;这是一个特殊的日子，犹记得整整四十年前，我还是一个青涩懵懂的少年。帮务农的父母进城办事时亲眼见证溪城大学落成的剪彩仪式。那时一颗种子就这样深深埋在我心底。庆幸我现在已经在这里有所作为，也算是不负年少时的梦吧，几多感慨啊！
