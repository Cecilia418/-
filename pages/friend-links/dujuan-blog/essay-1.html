  <div class="title">关于“跨界”的一点感想</div>
  <div class="date">2025-01-20</div>
  <div class="content">
     &nbsp;&nbsp;常有同行问我，怎么从民俗研究转向了地理、法学甚至涉及计算机领域。其实在我看来，学问本无界。当年做水神信仰调查时，接触了大量地方文献、碑刻、族谱，如何把这些材料系统整理、让更多研究者使用，自然就引向了数字化的问题。图书馆这个平台给了我跨界实践的机会，也感谢团队里不同专业背景的同学们，他们的视角常常让我眼前一亮。
  </div>
