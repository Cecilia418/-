  <div class="date">2013-08-25</div>
  <div class="content">
     &nbsp;&nbsp;这篇文章从田野调查到最终发表，断断续续用了五年时间。感谢那些愿意和我聊天的老人，感谢那些否定我的所谓“正统”学者，感谢“水神”！失态了，这篇文章的发表真是一个奇迹！这里提出的“模式研究”框架，其实源于一次偶然的发现：不同村落的水神祭祀仪式，表面差异很大，但深层结构高度相似。更关键的是遵循的那几条规律。民俗学的魅力，大概就在于透过表象看到那些稳定的文化逻辑。接下来打算把这个研究扩展成专著，希望能有更多奇迹再次发生。
