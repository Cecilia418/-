<div class="container">
  <div class="title">田野归来</div>
  <div class="date">2025-03-12</div>
  <div class="content">
    &nbsp;&nbsp;清明前又去了一趟清湖西岸，走访了几户老渔民。有位八十多岁的老人还能唱完整的“请神词”，录音回来整理了一夜，发现里面提到的“溪城郎”形象，和县志记载有微妙差异。民俗学最有意思的地方就在这里——活态的传承永远比文本丰富。感谢助理帮忙转录，其中流传最广的一段当属：“天惶惶，地隍隍。稽首皈衣溪城郎。善恶到头终有报，扶直蔑曲散彷徨。”这项工作预计年底可以成文。
  </div>
